# ==========================
#          기본옵션
# ==========================

spring.application.name: app
spring.profiles.active: local

logging:
  level:
    org.flywaydb: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

spring:
  config:
    import:
      - db-core.yml
      - oauth.yml

jwt:
  secret: dGhpc2lzdGVzdHNlY3JldGtleWRvbnR1c2V0aGlzc2VjcmV0a2V5
  access:
    expire-time: 1000000000
  refresh:
    expire-time: 1000000000

bouquet:
  link:
    prefix: http://localhost:3000/bouquet/

---
# ==========================
#          로컬옵션
# ==========================

spring.config.activate.on-profile: local

spring:
  config:
    import:
      - optional:oauth-local.yml

---
# ==========================
#          개발옵션
# ==========================
spring.config.activate.on-profile: dev

jwt:
  secret: ${DEV_JWT_SECRET}
  access:
    expire-time: ${DEV_ACCESS_EXPIRE_TIME}
  refresh:
    expire-time: ${DEV_REFRESH_EXPIRE_TIME}

bouquet:
  link:
    prefix: ${DEV_BOUQUET_LINK_PREFIX:https://heart-blooming.site/bouquet/}

---
# ==========================
#          운영옵션
# ==========================
spring.config.activate.on-profile: prod

jwt:
  secret: ${JWT_SECRET}
  access:
    expire-time: ${ACCESS_EXPIRE_TIME}
  refresh:
    expire-time: ${REFRESH_EXPIRE_TIME}

bouquet:
  link:
    prefix: ${BOUQUET_LINK_PREFIX:https://heart-blooming.site/bouquet/}
