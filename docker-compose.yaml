services:
  mysql:
    image: mysql:8.0
    container_name: heart-bloom-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: heartbloom
      MYSQL_USER: test
      MYSQL_PASSWORD: test01
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
